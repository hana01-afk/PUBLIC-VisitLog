<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VisitLog — 하나감정평가법인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VisitLog">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22VisitLog%20%ED%95%98%EB%82%98%EA%B0%90%EC%A0%95%22%2C%22short_name%22%3A%22VisitLog%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230D1B2A%22%2C%22theme_color%22%3A%22%230D1B2A%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D%2527http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%2527%2520viewBox%3D%25270%25200%252048%252048%2527%253E%253Crect%2520width%3D%252748%2527%2520height%3D%252748%2527%2520rx%3D%252712%2527%2520fill%3D%2527%25230D1B2A%2527%2F%253E%253Ccircle%2520cx%3D%252724%2527%2520cy%3D%252720%2527%2520r%3D%25276%2527%2520fill%3D%2527%25233B9EFF%2527%2F%253E%253Cpath%2520d%3D%252712%252032c0-6%25204-10%252010-10h4c6%25200%252010%25204%252010%252010%2527%2520fill%3D%2527%25233B9EFF%2527%2F%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%7D%5D%7D">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
  --bg:      #0D1B2A; --bg2:#152236; --bg3:#1C2E42; --bg4:#243A52;
  --sf:      #182E42;
  --bd:      rgba(255,255,255,.07); --bd2:rgba(255,255,255,.13);
  --tx:      #EDF2F7; --tx2:#8BAABF; --tx3:#4E6880;
  --ac:      #3B9EFF; --teal:#4ECDC4;
  --red:#E05252; --rbg:rgba(224,82,82,.12);
  --or:#E8923A;  --obg:rgba(232,146,58,.12);
  --yw:#F0C040;  --ybg:rgba(240,192,64,.10);
  --gn:#2ECC71;  --gbg:rgba(46,204,113,.12);
  --r:12px; --rs:8px;
  --fn:'Noto Sans KR',sans-serif; --mo:'JetBrains Mono',monospace;
  --tr:.15s ease;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}
#app{display:flex;flex-direction:column;min-height:100vh}

/* Header */
.hdr{background:var(--bg);padding:50px 18px 12px;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.hdr-t{font-size:19px;font-weight:700;letter-spacing:-.4px}
.hdr-s{font-size:11px;color:var(--tx3);margin-top:2px}

/* Page */
.page{flex:1;overflow-y:auto;padding-bottom:90px}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-top:1px solid var(--bd);display:flex;align-items:center;padding:6px 0 22px;z-index:200}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;cursor:pointer;color:var(--tx3);font-size:9px;font-weight:500;transition:color var(--tr)}
.ni.on{color:var(--ac)}
.ni svg{width:22px;height:22px}
.nf{flex:1;display:flex;justify-content:center;align-items:center}
.fab{width:50px;height:50px;background:var(--ac);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;margin-top:-18px;box-shadow:0 4px 18px rgba(59,158,255,.4);transition:transform var(--tr)}
.fab:active{transform:scale(.93)}
.fab svg{width:22px;height:22px;color:#fff}

/* Cards */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px 15px;margin:0 14px 9px}

/* Urgency */
.u-r{--uc:var(--red);--ub:var(--rbg)} .u-o{--uc:var(--or);--ub:var(--obg)}
.u-y{--uc:var(--yw);--ub:var(--ybg)} .u-g{--uc:var(--gn);--ub:var(--gbg)}

/* Client card */
.cc{display:flex;align-items:center;gap:11px;cursor:pointer}
.cs{width:4px;border-radius:2px;background:var(--uc);align-self:stretch;flex-shrink:0}
.cb{flex:1;min-width:0}
.cn{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-size:11px;color:var(--tx2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.dd{font-size:11px;font-weight:700;color:var(--uc);background:var(--ub);padding:3px 9px;border-radius:20px;font-family:var(--mo)}

/* Chips */
.chips{display:flex;gap:6px;overflow-x:auto;padding:10px 14px 4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--bd2);color:var(--tx2);background:transparent;cursor:pointer;transition:all var(--tr)}
.chip.on{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:600}

/* Labels */
.slbl{font-size:10.5px;font-weight:700;color:var(--tx3);letter-spacing:.07em;text-transform:uppercase;padding:14px 14px 5px}

/* Search */
.sw{padding:10px 14px}
.si{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--rs);padding:0 11px}
.si svg{width:15px;height:15px;color:var(--tx3);flex-shrink:0}
.si input{border:none;background:transparent;padding:10px 0;font-size:13px;color:var(--tx);flex:1;outline:none;font-family:var(--fn)}

/* Forms */
.ig{margin-bottom:13px}
.il{font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:5px;display:block}
input[type=text],input[type=password],input[type=date],textarea,select{width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--tx);font-family:var(--fn);font-size:13px;padding:9px 12px;outline:none;transition:border-color var(--tr);-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--ac)}
textarea{resize:none;height:78px;line-height:1.6}
select option{background:var(--bg3)}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border-radius:var(--rs);font-family:var(--fn);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all var(--tr)}
.btn:active{transform:scale(.97)}
.bp{background:var(--ac);color:#fff} .bs{background:var(--bg3);color:var(--tx);border:1px solid var(--bd2)}
.bd2{background:var(--rbg);color:var(--red);border:1px solid rgba(224,82,82,.25)}
.bg{background:var(--gbg);color:var(--gn);border:1px solid rgba(46,204,113,.25)}
.bsm{padding:6px 13px;width:auto;font-size:11px} .mt2{margin-top:8px}

/* Type grid */
.tg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.tb{padding:10px 7px;border-radius:var(--rs);border:1px solid var(--bd2);font-size:12px;font-weight:500;text-align:center;color:var(--tx2);cursor:pointer;background:var(--bg3);transition:all var(--tr)}
.tb.on{border-color:var(--teal);color:var(--teal);background:rgba(78,205,196,.08)}

/* Cycle */
.crow{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--bd)}
.crow:last-child{border-bottom:none}
.cc2{display:flex;align-items:center;gap:10px}
.cb2{width:28px;height:28px;border-radius:50%;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;transition:all var(--tr)}
.cb2:active{background:var(--bg4);transform:scale(.88)}
.cv{font-size:13.5px;font-weight:600;font-family:var(--mo);color:var(--ac);min-width:42px;text-align:center}

/* Upload */
.uz{border:2px dashed var(--bd2);border-radius:var(--r);padding:26px 14px;text-align:center;cursor:pointer;transition:all var(--tr);margin:10px 14px}
.uz:hover,.uz.drag{border-color:var(--ac);background:rgba(59,158,255,.04)}
.uz p{font-size:13px;color:var(--tx2);margin-top:8px} .uz span{font-size:11px;color:var(--tx3)}

/* Map container */
#gmap{height:260px;border-radius:var(--r);margin:10px 14px;border:1px solid var(--bd);background:var(--bg3)}
#dmmap{height:170px;border-radius:var(--r);margin:0 14px 10px;border:1px solid var(--bd);background:var(--bg3)}

/* Stats */
.sr{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:10px 14px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:11px;text-align:center}
.sn{font-size:26px;font-weight:700;font-family:var(--mo)} .sl{font-size:10px;color:var(--tx3);margin-top:2px;font-weight:500}

/* History */
.hi{display:flex;gap:11px;padding:11px 14px;border-bottom:1px solid var(--bd);cursor:pointer}
.hd{width:8px;height:8px;border-radius:50%;background:var(--ac);margin-top:5px;flex-shrink:0}
.hb{flex:1} .ht{font-size:13px;font-weight:600} .hm{font-size:11px;color:var(--tx2);margin-top:3px}
.hme{font-size:12px;color:var(--tx2);margin-top:5px;line-height:1.55}

/* Field rows */
.fr{display:flex;padding:9px 0;border-bottom:1px solid var(--bd);font-size:13px}
.fr:last-child{border-bottom:none}
.fl{color:var(--tx3);width:78px;flex-shrink:0;font-size:11.5px} .fv{flex:1;font-weight:500;word-break:break-all}

/* Progress */
.pb{height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.pbi{height:100%;border-radius:2px;transition:width .3s ease}

/* Spinner */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* GPS bar */
.gpb{display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(59,158,255,.06);border-bottom:1px solid var(--bd);font-size:11px;color:var(--ac)}
.gpd{width:7px;height:7px;border-radius:50%;background:var(--ac);animation:pl 1.5s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.25}}

/* Toast */
.toast{position:fixed;bottom:98px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--bd2);color:var(--tx);padding:9px 18px;border-radius:24px;font-size:12px;font-weight:500;z-index:1000;white-space:nowrap;animation:ti .18s ease,to2 .18s ease 2.8s forwards}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes to2{to{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* 오프라인 배너 */
.offline-banner{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--or);color:#fff;font-size:11.5px;font-weight:600;text-align:center;padding:7px 14px;z-index:9999;letter-spacing:.03em}
/* Empty */
.empty{text-align:center;padding:56px 28px;color:var(--tx3)}
.empty h3{font-size:14px;color:var(--tx2);margin:10px 0 6px} .empty p{font-size:12px;line-height:1.65}

/* Badges */
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.02em}
.br{background:var(--rbg);color:var(--red)} .bo{background:var(--obg);color:var(--or)}
.bg2{background:var(--gbg);color:var(--gn)} .ba{background:rgba(59,158,255,.12);color:var(--ac)}

/* Drive / Sheets status */
.ds{display:flex;align-items:center;gap:8px;font-size:12px;padding:8px 11px;border-radius:var(--rs);border:1px solid var(--bd2);margin-bottom:11px}
.ds.ok{background:var(--gbg);border-color:rgba(46,204,113,.3);color:var(--gn)}
.ds.err{background:var(--rbg);border-color:rgba(224,82,82,.25);color:var(--red)}
.ds.busy{background:rgba(139,170,191,.1);color:var(--tx2)}

/* Login */
.lsc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center}
.llo{width:72px;height:72px;background:var(--ac);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:32px}
.lt{font-size:22px;font-weight:700;margin-bottom:6px} .ls{font-size:13px;color:var(--tx2);margin-bottom:32px;line-height:1.6}

/* Sheets progress */
.sheets-progress{font-size:11px;color:var(--ac);padding:6px 0;text-align:center;font-family:var(--mo)}

.tag{font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(78,205,196,.12);color:var(--teal);font-weight:500}
.row{display:flex;align-items:center} .f1{flex:1} .jb{justify-content:space-between}
.g2{gap:8px} .g3{gap:12px} .mt3{margin-top:12px}
.divider{height:1px;background:var(--bd);margin:8px 14px}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════
// 0. CONFIG
// ═══════════════════════════════════════════════
// Gemini 기본 모델 — CFG.geminiModel 설정값으로 오버라이드 가능
const GEMINI_MODEL_DEFAULT = 'gemini-2.0-flash';
// Gemini 키/모델은 관리자 설정(CFG.geminiKey / CFG.geminiModel)으로 관리 — 하드코딩 금지
const STORAGE_PREFIX = 'vl_hana_v5_user_';  // 사용자별 데이터 분리
const STORAGE_LEGACY = 'vl_hana_v4';         // 마이그레이션용
const CFG_KEY      = 'vl_hana_cfg';          // 전역 설정 (관리자가 설정, 모두 공유)

const CATEGORIES = ['제1금융권','제2금융권/단위조합','공공기관/특수기관','일반기업','증권사/보험사'];
const DEF_CYCLES = {'제1금융권':30,'제2금융권/단위조합':60,'공공기관/특수기관':90,'일반기업':45,'증권사/보험사':30};
const VISIT_TYPES = ['단순 방문','기존 거래처 관리','신규 개척','기타 약속'];
const CYCLE_HINTS = {
  '제1금융권':'국민·신한·우리·하나·기업은행',
  '제2금융권/단위조합':'새마을금고·농협·수협 단위조합',
  '공공기관/특수기관':'지자체·공기업·보증기관',
  '일반기업':'중소기업·제조사 등',
  '증권사/보험사':'금융투자업 관련 기관',
};

const CLIENT_HEADERS  = ['ID','회사명','지점명','카테고리','주소','담당자','연락처','등록자','최근방문','위도','경도','등록일'];
const VISIT_HEADERS   = ['ID','거래처ID','방문유형','날짜','메모','다음예정','등록일'];
const CYCLE_HEADERS   = ['카테고리','방문주기(일)'];

// ═══════════════════════════════════════════════
// 1. STATE
// ═══════════════════════════════════════════════
// ── 전역 설정 (관리자가 설정, 모든 사용자 공유) ─────────────
function loadCfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY)); }catch{ return null; } }
function saveCfg(c){ try{ localStorage.setItem(CFG_KEY,JSON.stringify(c)); }catch{} }

const _cfg = loadCfg() || {};
let CFG = {
  gasUrl:      _cfg.gasUrl      || '',  // GAS Web App URL (백엔드)
  mapsKey:     _cfg.mapsKey     || '',
  geminiKey:   _cfg.geminiKey   || '',  // Gemini API 키 (관리자 설정)
  geminiModel: _cfg.geminiModel || GEMINI_MODEL_DEFAULT,  // Gemini 모델 (관리자 설정)
  adminPwHash: _cfg.adminPwHash || '',
  // 팀원 관리 (관리자가 추가/승인)
};

// ── 사용자 세션 상태 (사용자별 분리 저장) ───────────────────
function userKey(name){ return STORAGE_PREFIX + (name || 'guest'); }
function loadUserData(name){ try{ return JSON.parse(localStorage.getItem(userKey(name))); }catch{ return null; } }
function saveUserData(name,s){ try{ localStorage.setItem(userKey(name),JSON.stringify(s)); }catch{} }

// 세션 정보(누가 로그인 중인지)는 별도 키
const SESSION_KEY = 'vl_hana_session';
function loadSession(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }catch{ return null; } }
function saveSession(u){ try{ localStorage.setItem(SESSION_KEY,JSON.stringify(u)); }catch{} }

// ── 앱 재실행 시 항상 로그인 화면 표시 (세션 자동 복원 비활성화)
// 사용자 데이터(거래처 등)는 로그인 후 이름 기반으로 불러옴
loadSession(); // (구 세션 정보는 읽지 않고 바로 초기화)
saveSession(null);

let S = {
  user:    null,   // 항상 로그인 화면으로 시작
  clients: [],
  visits:  [],
  cycles:  {...DEF_CYCLES},
  drive:   {connected:false,accessToken:null,expiresAt:null},
  shareEnabled: false,
};

function set(patch,skipSave=false){
  S={...S,...patch};
  if(!skipSave){
    if(S.user?.name){
      saveUserData(S.user.name,{clients:S.clients,visits:S.visits,cycles:S.cycles,synced:S.synced,shareEnabled:S.shareEnabled});
    }
    saveSession(S.user);
  }
  render();
}

// SHA-256 해시 (관리자 비밀번호 저장용)
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ═══════════════════════════════════════════════
// 2. UTILS
// ═══════════════════════════════════════════════
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function urgency(lastDate,cycle){
  if(!lastDate) return {pct:999,cls:'u-r',bar:'#E05252',lbl:'미방문',dd:'미방문'};
  // 날짜 유효성 검사 (엑셀 시리얼 번호 등 잘못된 값 방어)
  const d=new Date(lastDate);
  if(isNaN(d.getTime())||d.getFullYear()<2000||d.getFullYear()>2100){
    return {pct:999,cls:'u-r',bar:'#E05252',lbl:'미방문',dd:'미방문'};
  }
  const days=Math.floor((Date.now()-d)/86400000);
  if(days<0) return {pct:0,cls:'u-g',bar:'#2ECC71',lbl:'양호',dd:`D-${cycle}`}; // 미래 날짜 방어
  const pct=Math.round(days/cycle*100);
  if(pct>=111) return{pct,cls:'u-r',bar:'#E05252',lbl:'초과',   dd:`D+${days-cycle}`};
  if(pct>= 91) return{pct,cls:'u-o',bar:'#E8923A',lbl:'위험',   dd:`D-${cycle-days}`};
  if(pct>= 71) return{pct,cls:'u-y',bar:'#F0C040',lbl:'주의',   dd:`D-${cycle-days}`};
  return             {pct,cls:'u-g',bar:'#2ECC71',lbl:'양호',   dd:`D-${cycle-days}`};
}

function hav(la1,lo1,la2,lo2){
  const R=6371000,r=Math.PI/180;
  const a=Math.sin((la2-la1)*r/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin((lo2-lo1)*r/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(a)));
}
function sim(a,b){
  a=a.replace(/[^가-힣a-z0-9]/gi,'').toLowerCase();
  b=b.replace(/[^가-힣a-z0-9]/gi,'').toLowerCase();
  if(a===b)return 1;
  const s=new Set(a);return[...b].filter(c=>s.has(c)).length/Math.max(a.length,b.length);
}
function autoCat(n=''){
  const s=n.replace(/[\s()\[\]㈜주식회사]/g,'');

  // ── 제1금융권: 시중은행·특수은행 ──────────────────────────
  if(/(국민|신한|우리|하나|기업|농협|수협|산업|외환|한국씨티|SC제일|씨티|도이치|BNK|DGB|JB|카카오|케이|토스|광주|전북|제주|경남|부산|대구)은행/.test(s))return'제1금융권';
  if(/은행/.test(s)&&!/(저축은행|상호저축)/.test(s))return'제1금융권';

  // ── 제2금융권/단위조합 ──────────────────────────────────
  if(/(새마을금고|마을금고)/.test(s))return'제2금융권/단위조합';
  if(/(단위농협|지역농협|농협단위|농업협동조합)/.test(s))return'제2금융권/단위조합';
  if(/(단위수협|지구별수협|수협단위|수산업협동조합)/.test(s))return'제2금융권/단위조합';
  if(/(신용협동조합|신협)/.test(s))return'제2금융권/단위조합';
  if(/(저축은행|상호저축|상호금융)/.test(s))return'제2금융권/단위조합';
  if(/(조합|금고|공제)/.test(s)&&!/(연금|공무원|군인|사학|과학기술|신용보증|기술신용)/.test(s))return'제2금융권/단위조합';

  // ── 공공기관/특수기관 ───────────────────────────────────
  if(/(한국토지주택|LH|SH공사|GH|경기도시공사)/.test(s))return'공공기관/특수기관';
  if(/(기술보증기금|기보|신용보증기금|신보|주택금융공사|HF|중소벤처|중진공|소상공인|IBK기업|산업은행|수출입은행)/.test(s))return'공공기관/특수기관';
  if(/(시청|구청|도청|군청|읍사무소|면사무소|주민센터|행정복지센터)/.test(s))return'공공기관/특수기관';
  if(/(국가|정부|공무원|공단|공사|공기업|청(?!구|년)|원(?!금)|위원회|처$|부$|청$)/.test(s))return'공공기관/특수기관';
  if(/(감정원|한국부동산원|국토연구원|한국감정평가사)/.test(s))return'공공기관/특수기관';

  // ── 증권사/보험사 ────────────────────────────────────────
  if(/(증권|투자증권|자산운용|선물|자산관리)/.test(s))return'증권사/보험사';
  if(/(생명보험|손해보험|화재보험|보험사|보험(?!료|증)|공제(?=회|조합))/.test(s))return'증권사/보험사';

  return'일반기업';
}

function parseRows(rows){
  // 실제 업무 엑셀 헤더명 매핑
  const MAP={
    '회사명':'companyName','업체명':'companyName','거래처명':'companyName',
    '거래처':'companyName','기관명':'companyName','의뢰처':'companyName',
    '의뢰기관':'companyName','금융기관':'companyName','금융기관명':'companyName',
    '지점명':'branchName','지점':'branchName','영업점':'branchName',
    '의뢰부서':'branchName','부서명':'branchName','센터명':'branchName',
    '담당자':'contactName','담당자명':'contactName','의뢰담당':'contactName',
    '의뢰담당자':'contactName','담당':'contactName','성명':'contactName',
    '담당자(의뢰)':'contactName',
    '전화':'contactPhone','연락처':'contactPhone','전화번호':'contactPhone',
    '팩스번호':'contactPhone','휴대폰':'contactPhone','핸드폰':'contactPhone',
    // 주소/소재지는 물건 소재지이므로 거래처 주소로 사용하지 않음
    // '주소':'address','소재지':'address',  ← 제거
    '카테고리':'category','분류':'category','업종':'category','업무구분':'category',
    '담당직원':'assignee','직원':'assignee','팀':'assignee','담당팀':'assignee',
    '내부담당자':'assignee','담당자(내부)':'assignee','본사담당':'assignee',
  };

  if(!rows.length)return[];

  // 헤더 행 탐색 (최대 5행)
  let headerRowIdx=0;
  for(let i=0;i<Math.min(rows.length,5);i++){
    const row=rows[i];
    const matched=row.filter(h=>MAP[String(h||'').trim()]);
    if(matched.length>=2){headerRowIdx=i;break;}
  }

  const hdrs=rows[headerRowIdx].map(h=>MAP[String(h||'').trim()]||null);
  const dataRows=rows.slice(headerRowIdx+1);

  // 1단계: 모든 행 파싱
  const rawList=dataRows.map(row=>{
    const o={};
    hdrs.forEach((f,i)=>{
      if(f&&row[i]!=null&&String(row[i]).trim()){
        if(!o[f]) o[f]=String(row[i]).trim();
      }
    });
    if(!o.companyName)return null;

    // 거래처명에서 지점명 분리
    let companyName=o.companyName;
    let branchName=o.branchName||'';
    if(!branchName){
      const m=companyName.match(/^(.+?)\s+([\w가-힣]+(?:지점|영업점|센터장?|지사|출장소|본점|지부|본부|사업단))$/);
      if(m){companyName=m[1];branchName=m[2];}
    }

    // 담당자가 현재 사용자 이름과 같으면 제외 (사용자 본인 이름은 거래처 담당자가 아님)
    const me=S.user?.name||'';
    const approvedNames=[me, ...(CFG.approvedMembers||[]).map(m=>m.name)];
    let contactName=o.contactName||'';
    if(contactName){
      // "김은", "김은과장", "김은 과장" 등의 형태에서 사용자 이름 부분 제외
      const isUserName = approvedNames.some(n=>n && (contactName===n || contactName.startsWith(n+' ') || contactName.startsWith(n+',')));
      if(isUserName) contactName='';
    }

    return{
      companyName,branchName,
      contactName,
      contactPhone:o.contactPhone||'',
    };
  }).filter(Boolean);

  // 2단계: 거래처명만으로 통합 (지점명은 첫 번째 값 채택, 담당자는 모두 병합)
  const merged=new Map(); // key: "companyName"
  rawList.forEach(r=>{
    const key=r.companyName;
    if(merged.has(key)){
      const existing=merged.get(key);
      // 담당자 병합
      if(r.contactName && !existing.contacts.includes(r.contactName)){
        existing.contacts.push(r.contactName);
      }
      // 지점명 — 첫 번째 값 유지하되 비어있으면 채움
      if(!existing.branchName && r.branchName) existing.branchName=r.branchName;
      if(!existing.contactPhone && r.contactPhone) existing.contactPhone=r.contactPhone;
      existing.count++;
    }else{
      merged.set(key,{
        companyName:r.companyName,
        branchName:r.branchName,
        contacts: r.contactName?[r.contactName]:[],
        contactPhone:r.contactPhone,
        count:1,
      });
    }
  });

  // 3단계: 빈 담당자는 같은 회사명 다른 항목에서 가져오기 (이미 통합되어 의미 없지만 안전망)
  // 4단계: 최종 객체 생성
  return[...merged.values()].map(v=>{
    const fullName=v.companyName+(v.branchName?' '+v.branchName:'');
    const cat=autoCat(fullName);
    return{
      id:uid(),
      companyName:v.companyName,
      branchName:v.branchName,
      category:cat,
      address:'',  // 거래처 주소는 자동 검색 또는 직접 입력
      contactName:v.contacts.join(', '),  // 복수 담당자 쉼표 병기
      contactPhone:v.contactPhone||'',
      ownerName:S.user?.name||'',  // 등록한 본인
      lastVisitDate:null,  // 미방문 디폴트
      lat:null,lng:null,
      createdAt:new Date().toISOString(),
    };
  });
}

// 3. OCR API (명함 인식)
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// 명함 OCR — 라우팅 전략
//   1순위: GAS 프록시 ocrCard → Claude Vision API
//          (API 키는 GAS 스크립트 속성(CLAUDE_KEY)에만 존재. 앱은 base64만 전송)
//   2순위: Gemini Vision 폴백 (GAS 오류 또는 CLAUDE_KEY 미설정 시, GEMINI_KEY 필요)
//   3순위: 수동 입력 안내
// ═══════════════════════════════════════════════
const ClaudeAI = {
  async card(b64, onProgress) {
    // ── 1순위: GAS 프록시(ocrCard) → Claude Vision ──
    // GAS _dispatch()의 action 이름: 'ocrCard' / 파라미터: imageB64, mime
    if (CFG.gasUrl) {
      try {
        onProgress && onProgress('AI 명함 분석 중...');
        const res = await fetch(CFG.gasUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: 'ocrCard',   // GAS _dispatch case 'ocrCard' 와 일치
            user: S.user?.name || '',
            imageB64: b64,       // GAS _ocrCard(imageB64, mimeType) 의 첫 번째 파라미터
            mime: 'image/jpeg'   // GAS _ocrCard 두 번째 파라미터
          })
        });
        if (res.ok) {
          const json = await res.json();
          if (json.ok && json.data) {
            // GAS(normalizeNameCard)는 정규화된 거래처 필드를 반환.
            // 구버전({parsed:{...}}) / 신버전(평탄 객체) 모두 수용.
            const raw = json.data.parsed || json.data;
            const p = typeof raw === 'string' ? JSON.parse(raw) : raw;
            if (p && (p.companyName !== undefined || p.contactName !== undefined)) {
              const engine = json.data.engine || 'claude';
              onProgress && onProgress(engine + ' 인식 완료');
              return {
                companyName:  p.companyName  || '',
                branchName:   p.branchName   || '',
                contactName:  p.contactName  || '',
                contactTitle: p.contactTitle || p.title || '',
                contactPhone: p.phone        || p.contactPhone || '',
                fax:          p.fax          || '',
                email:        p.email        || '',
                address:      p.address      || '',
              };
            }
          }
        }
        // GAS ocrCard 미응답 → Gemini 폴백
        console.warn('GAS ocrCard 미응답 — Gemini 폴백 진행');
      } catch(e) {
        console.warn('GAS ocrCard fetch 오류:', e.message, '— Gemini 폴백 진행');
      }
    }

    // ── 2순위: Gemini Vision 폴백 (GAS URL 미설정 또는 GAS 오류 시) ──
    if (CFG.geminiKey) {
      return Gem.card(b64, (msg) => {
        onProgress && onProgress('Gemini Vision 분석 중...');
      });
    }

    // ── 3순위: 수동 입력 안내 ──
    throw new Error('명함 OCR을 사용할 수 없습니다.\\n\\n' +
      'GAS 서버 URL이 설정되지 않았거나 연결에 실패했습니다.\\n' +
      '[설정 → GAS 서버 URL]을 확인하고,\\n' +
      'GAS 스크립트 속성에 CLAUDE_KEY 가 등록되어 있는지 확인해주세요.\\n\\n' +
      '지금은 아래 항목을 직접 입력해주세요.');
  }
};

const Gem={
  async call(prompt,b64=null,mime='image/jpeg'){
    const parts=[];
    if(b64)parts.push({inlineData:{mimeType:mime,data:b64}});
    parts.push({text:prompt});
    const gemKey=CFG.geminiKey;
    if(!gemKey)throw new Error('Gemini API 키가 설정되지 않았습니다.\n[설정 → Gemini API 키]에서 입력해주세요.');
    const model=CFG.geminiModel||GEMINI_MODEL_DEFAULT;
    const _callOnce = async () => fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${gemKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts}],generationConfig:{temperature:0.1,maxOutputTokens:1500}})}
    );
    let res = await _callOnce();
    if(res.status===429){
      const e429=await res.json().catch(()=>({}));
      const msg429=e429?.error?.message||'';
      const retryMatch=msg429.match(/retry in ([\d.]+)s/i);
      const waitSec=retryMatch?Math.ceil(parseFloat(retryMatch[1])):15;
      toast(`잠시 후 자동 재시도합니다 (${waitSec}초)...`);
      await new Promise(r=>setTimeout(r, waitSec*1000+500));
      res = await _callOnce();
    }
    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      const msg=e?.error?.message||'';
      if(res.status===429||msg.includes('quota')||msg.includes('RESOURCE_EXHAUSTED')){
        throw new Error('Gemini API 요청이 일시적으로 제한됐습니다.\n잠시 후 다시 시도해주세요.\n(분당 요청 한도 초과)');
      }
      throw new Error(msg||`Gemini 오류(${res.status})`);
    }
    const d=await res.json();
    const txt=d?.candidates?.[0]?.content?.parts?.[0]?.text;
    if(!txt)throw new Error('Gemini 응답 없음');
    return txt;
  },
  // ── 명함 OCR (Gemini Vision) — ClaudeAI 폴백용 ──────────────
  async card(b64, onProgress){
    const gemKey = CFG.geminiKey;
    if(!gemKey) throw new Error('Gemini API 키가 설정되지 않았습니다.\n[설정 → Gemini API 키]에서 입력해주세요.');

      {inlineData:{mimeType:'image/jpeg',data:b64}},

반드시 JSON 객체만 반환하고, 마크다운 코드블록(\`\`\`)이나 설명 텍스트를 절대 포함하지 말 것.
키: companyName(회사명), branchName(지점·부서명), contactName(담당자 이름), contactTitle(직책),
phone(전화번호), fax(팩스번호), email(이메일), address(주소).
값이 없으면 빈 문자열 "". 한국어 명함 우선.`}
    ];
    const _call = ()=>fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${gemKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts}],generationConfig:{temperature:0.1,maxOutputTokens:800}})}
    );
    let r = await _call();
    if(r.status===429){
      const e=await r.json().catch(()=>({}));
      const m=e?.error?.message||'';
      const sec=Math.ceil(parseFloat((m.match(/retry(?:\s+after)?\s*([\d.]+)\s*s/i)||[])[1]||30));
      for(let t=sec;t>0;t--){onProgress&&onProgress(`요청 한도 초과 — ${t}초 후 재시도...`);await new Promise(r=>setTimeout(r,1000));}

    const url = CFG.gasUrl;
    if (!url) throw new Error('서버 URL이 설정되지 않았습니다.\n관리자 설정 화면에서 GAS URL을 입력하세요.');
    const payload = JSON.stringify({action, user: S.user?.name || '', ...data});
    const res = await fetch(url, {method:'POST', headers:{'Content-Type':'text/plain'}, body:payload});
    if (!res.ok) throw new Error('서버 오류 (HTTP ' + res.status + ')');
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || '서버 오류');
    return json.data;
  },

  async ping() { return this.call('ping'); },

  // 거래처+방문기록 저장
  async save(onProgress) {
    const me = S.user?.name || '';
    onProgress && onProgress(me + ' 데이터 저장 중...');
    const myClients = S.clients.filter(c => !c._shared && (c.ownerName === me || !c.ownerName));
    const myVisits  = S.visits.filter(v => myClients.some(c => c.id === v.clientId));
    await this.call('saveClients', {clients: myClients, visits: myVisits, cycles: S.cycles, shareEnabled: S.shareEnabled});
    const now = new Date().toISOString();
    S.synced = true; S.syncedAt = now;
    saveUserData(me, {clients:S.clients, visits:S.visits, cycles:S.cycles, synced:true, shareEnabled:S.shareEnabled});
  },

  // 서버에서 거래처+방문기록 불러오기
  async load(onProgress) {
    onProgress && onProgress('서버에서 불러오는 중...');
    const result = await this.call('loadClients');
    const {clients=[], visits=[], cycles={}, shareEnabled=false} = result;
    const merged = Object.assign({}, DEF_CYCLES, cycles);
    const now = new Date().toISOString();
    S.synced = true; S.syncedAt = now; S.shareEnabled = shareEnabled;
    S.clients = clients; S.visits = visits; S.cycles = merged;
    saveUserData(S.user?.name || '', {clients, visits, cycles:merged, synced:true, shareEnabled});
    render();
    return {clientCount: clients.length, visitCount: visits.length};
  },

  // 공유된 다른 팀원 거래처 가져오기
  async getShared(targetUser) {
    const result = await this.call('getSharedOf', {target: targetUser});
    return result.clients || [];
  },

  async checkMember(name)    { return this.call('checkMember',  {name}); },
  async requestMember(name)  { return this.call('requestMember',{name}); },
  async getMembers()         { return this.call('getMembers'); },
  async approveMember(name)  { return this.call('approveMember',{name}); },
  async rejectMember(name)   { return this.call('rejectMember', {name}); },
  async removeMember(name)   { return this.call('removeMember', {name}); },
  async addMember(name)      { return this.call('addMember',    {name}); },
};

// 5. NAVER MAPS
// ═══════════════════════════════════════════════
let _nmap=null, _nmarkers=[], _gpsWatcher=null;
let _nmapElId=null;   // 현재 _nmap이 바인딩된 #gmap 엘리먼트 스탬프
let _gpsMarker=null;  // 현재위치 마커 — 별도 관리
let _openIw=null;     // 현재 열린 InfoWindow (하나만 유지)

// ── 스크립트 로드 ────────────────────────────────────────────
function loadMapsScript(){
  const key=CFG.mapsKey;
  if(!key) return;
  // 이미 로드됐거나 스크립트 태그가 존재하면 스킵
  if(window.naver?.maps?.Map) { scheduleInitGMap(); return; }
  if(document.getElementById('nmaps-script')) return;
  const s=document.createElement('script');
  s.id='nmaps-script';
  // ── 네이버 지도 SDK 로드 (2025+ 통합 콘솔 사양) ───────────────
  //   · 도메인 : oapi.map.naver.com  (구 openapi.map.naver.com 아님)
  //   · 파라미터: ncpKeyId           (구 ncpClientId 아님 — 인증실패 주범)
  //   · submodules=geocoder : naver.maps.Service.geocode 사용에 필요
  s.src=`https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${key}&submodules=geocoder&callback=onMapsLoaded`;
  s.onerror=()=>{ toast('⚠ 네이버 지도 스크립트 로드 실패 — Client ID 또는 콘솔의 웹 서비스 URL 등록을 확인하세요'); };
  document.head.appendChild(s);
}

// 네이버 SDK 로드 완료 콜백 (URL callback= 파라미터로 자동 호출)
window.onMapsLoaded=()=>{
  _nmap=null; _nmapElId=null;
  if(page==='map') scheduleInitGMap();
};

// ── 네이버 지도 인증 실패 전역 핸들러 (v2) ───────────────────────
//  Authentication Failed (200) 발생 시 네이버 SDK가 이 함수를 호출함.
//  주원인: ① Client ID 오타  ② NCP 콘솔에 현재 도메인(웹 서비스 URL) 미등록
//  → 사용자 안내 토스트 + 지도 탭이면 목록 탭으로 폴백
window.navermaps_authFailure=function(){
  console.error('[네이버 지도] Authentication Failed — Client ID 또는 도메인 등록 확인 필요');
  const host = location.origin;
  toast('⚠ 네이버 지도 인증 실패\nNCP 콘솔에 이 도메인을 등록했는지 확인하세요:\n'+host);
  // 지도 탭에 있었다면 목록 모드로 안전하게 폴백
  if(page==='map'){ page='list'; try{ render(); }catch{} }
};

// ── 좌표 → 주소 (reverseGeocode) : 현재 위치 주소 표기용 (v2) ──
//  GPS 획득 후 GPS 바(#gps-txt)에 행정구역 주소를 덧붙여 표시.
//  네이버 SDK·geocoder 서브모듈이 없으면 조용히 무시(좌표만 표시).
function updateGpsAddress(){
  if(!gps || !window.naver?.maps?.Service?.reverseGeocode) return;
  try{
    naver.maps.Service.reverseGeocode({
      coords: new naver.maps.LatLng(gps.lat, gps.lng),
      orders: [naver.maps.Service.OrderType.ROAD_ADDR, naver.maps.Service.OrderType.ADDR].join(',')
    }, (status, response)=>{
      if(status!==naver.maps.Service.Status.OK) return;
      const addr = response.v2?.address?.roadAddress
                || response.v2?.address?.jibunAddress || '';
      if(!addr) return;
      gps.address = addr;
      const el=document.getElementById('gps-txt');
      if(el) el.textContent = `${addr} · ±${gps.accuracy}m`;
    });
  }catch(e){ /* 좌표 표시 유지 */ }
}

// render() 직후에는 DOM 레이아웃이 미완성일 수 있으므로
// 항상 setTimeout(0)으로 한 틱 뒤 실행
function scheduleInitGMap(){
  setTimeout(()=>{ if(page==='map') initGMap(); }, 0);
}

function initGMap(){
  if(!window.naver?.maps?.Map) return; // SDK 미로드
  const el=document.getElementById('gmap');
  if(!el||el.offsetParent===null) return; // 엘리먼트 없거나 숨겨짐

  // ── 이미 이 엘리먼트에 지도가 붙어 있으면 마커만 갱신 ──────
  if(_nmap && _nmapElId && el.getAttribute('data-nmap-stamp')===_nmapElId){
    if(_gpsMarker){ _gpsMarker.setMap(null); _gpsMarker=null; }
    if(gps) _addGpsMarker();
    placeMapMarkers();
    return;
  }

  // ── 신규 초기화 ──────────────────────────────────────────
  _nmarkers.forEach(m=>{ try{m.setMap(null);}catch{} });
  _nmarkers=[];
  if(_gpsMarker){ try{_gpsMarker.setMap(null);}catch{} _gpsMarker=null; }
  if(_openIw){ try{_openIw.close();}catch{} _openIw=null; }

  _nmapElId='nm_'+Date.now();
  el.setAttribute('data-nmap-stamp', _nmapElId);

  const center = gps
    ? new naver.maps.LatLng(gps.lat, gps.lng)
    : new naver.maps.LatLng(37.5665, 126.9780);

  _nmap = new naver.maps.Map(el, {
    center, zoom: 14,
    mapTypeControl: false,
    zoomControl: true,
    zoomControlOptions: { position: naver.maps.Position.TOP_RIGHT },
    scaleControl: false,
    logoControl: true,
    mapDataControl: false,
  });

  // 지도 클릭 시 열린 InfoWindow 닫기
  naver.maps.Event.addListener(_nmap, 'click', ()=>{
    if(_openIw){ _openIw.close(); _openIw=null; }
  });

  if(gps) _addGpsMarker();
  placeMapMarkers();
  if(gps) updateGpsAddress();
}

// ── 현재위치 마커 ──────────────────────────────────────────
function _addGpsMarker(){
  if(!_nmap||!gps) return;
  _gpsMarker = new naver.maps.Marker({
    position: new naver.maps.LatLng(gps.lat, gps.lng),
    map: _nmap,
    icon: {
      content: `<div style="width:18px;height:18px;border-radius:50%;background:#3B9EFF;border:3px solid #fff;box-shadow:0 0 0 3px rgba(59,158,255,.3),0 2px 8px rgba(0,0,0,.4)"></div>`,
      anchor: new naver.maps.Point(9, 9),
    },
    title: '현재 위치',
    zIndex: 9999,
  });
}

// ── 마커 HTML: 은행명(소) + 지점명(대) + 관리상태 뱃지 ────────

      <div style="font-size:9px;font-weight:700;color:${statusBg};line-height:1.3;font-family:'Noto Sans KR',sans-serif">${statusIcon} ${u.lbl}${u.pct<999?' '+u.dd:''}</div>

// ── 슬라이더 oninput용: 지도는 유지한 채 근처 목록 DOM만 갱신 ──
function _refreshNearby(){
  const listEl=document.getElementById('nearby-list');

  if(!listEl||!lblEl||!gps) return;
  const nearby=S.clients

        <div class="cb">
          <div class="cn">${c.companyName}${c.branchName?' '+c.branchName:''}</div>
          <div class="cm">${c.dist}m · ${c.u.lbl} ${c.u.dd}</div>

        <button class="btn bp bsm" onclick="event.stopPropagation();go('visit','${c.id}')">방문</button>
      </div>`).join('')

// ── 지도 위 마커 전체 갱신 ──────────────────────────────────
function placeMapMarkers(){
  if(!_nmap||!window.naver?.maps) return;
  // 기존 마커 제거
  _nmarkers.forEach(m=>{ try{m.setMap(null);}catch{} });
  _nmarkers=[];
  if(_openIw){ try{_openIw.close();}catch{} _openIw=null; }

  S.clients.filter(c=>c.lat&&c.lng).forEach(c=>{
    const u = getU(c);
    const color = u.cls==='u-r'?'#E05252':u.cls==='u-o'?'#E8923A':u.cls==='u-y'?'#F0C040':'#2ECC71';

    const m = new naver.maps.Marker({
      position: new naver.maps.LatLng(c.lat, c.lng),
      map: _nmap,
      icon: {
        content: _makeMarkerEl(c, color, u),
        // anchor 는 마커 HTML의 transform:translateX(-50%) 로 수평 중앙 처리
        anchor: new naver.maps.Point(0, 12),
      },
      title: c.companyName+(c.branchName?' '+c.branchName:''),
      zIndex: u.cls==='u-r'?30:u.cls==='u-o'?20:u.cls==='u-y'?10:5,
    });

    const iw = new naver.maps.InfoWindow({
      content: _makeIwContent(c, color, u),
      borderWidth: 0,
      backgroundColor: 'transparent',
      disableAnchor: true,
      pixelOffset: new naver.maps.Point(0, -8),
    });

    naver.maps.Event.addListener(m, 'click', ()=>{
      if(_openIw && _openIw !== iw){ _openIw.close(); }
      if(iw.getMap()){ iw.close(); _openIw=null; }
      else { iw.open(_nmap, m); _openIw=iw; }
    });
    _nmarkers.push(m);
  });
}

let page='list',pageParam=null;
function go(p,param=null){
  // 지도 페이지 이탈 시 지도 인스턴스 리셋 → 재방문 시 새 #gmap에 재초기화
  if(page==='map'&&p!=='map'){ _nmap=null; _nmapElId=null; _gpsMarker=null; _nmarkers=[]; }
  page=p;pageParam=param;window.scrollTo(0,0);render();

    setTimeout(()=>_refreshMembers(),300);
  }
}

// 7. GPS
// ═══════════════════════════════════════════════
let gps=null,gpsLoading=false,mapRadius=300;

function reqGPS(){
  if(!navigator.geolocation){showGpsHelp('unsupported');return;}
  gpsLoading=true;render();

  // watchPosition으로 여러 번 측정해서 정확도가 가장 좋은 것 사용
  let bestAccuracy=Infinity, watchId=null, finished=false;

  const finish=(pos)=>{
    if(finished)return; finished=true;
    if(watchId!==null) navigator.geolocation.clearWatch(watchId);
    if(!pos){gpsLoading=false;showGpsHelp('unavailable');render();return;}
    gps={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:Math.round(pos.coords.accuracy)};
    gpsLoading=false;

    if(gps.accuracy>500){
      toast(`⚠ 위치 정확도 ${gps.accuracy}m — 실외에서 다시 시도하세요`);
    }

    // ── GPS 획득 후 처리 ──────────────────────────────────────
    // render()는 root.innerHTML로 #gmap을 파괴하므로 최대한 DOM 직접 수정을 우선.
    // render()의 gmapNode 보존 로직이 있지만, finish() 시점에는 _nmap이
    // 아직 없을 수도 있으므로(첫 GPS 획득 전 initGMap이 안 돌았을 경우)
    // 두 경로를 모두 처리.

    if(page==='map'){
      if(_nmap){
        // ── 지도가 이미 초기화됨 → DOM 직접 수정으로 render() 최소화 ──
        // GPS bar 텍스트만 업데이트
        const gpsTxt=document.getElementById('gps-txt');
        if(gpsTxt) gpsTxt.textContent=`${gps.lat.toFixed(4)}°N, ${gps.lng.toFixed(4)}°E · ±${gps.accuracy}m`;
        else render(); // GPS bar가 없으면(첫 GPS 획득) render()로 생성
        updateGpsAddress();
        // 지도 중심 이동 + GPS 마커 교체
        _nmap.panTo(new naver.maps.LatLng(gps.lat,gps.lng));
        _nmap.setZoom(16);
        if(_gpsMarker){try{_gpsMarker.setMap(null);}catch{} _gpsMarker=null;}
        _addGpsMarker();
        // 근처 거래처 목록만 갱신 (지도는 그대로)
        _refreshNearby();
      } else {
        // ── 지도 미초기화 → render()로 GPS bar 추가 후 새로 초기화 ──
        render();
        scheduleInitGMap();
      }
    } else {
      // 지도 페이지가 아니면 그냥 render()
      render();
    }
  };

  watchId=navigator.geolocation.watchPosition(
    p=>{
      // 정확도 50m 미만이면 즉시 종료, 아니면 더 좋은 값 누적
      if(p.coords.accuracy<50){finish(p);return;}
      if(p.coords.accuracy<bestAccuracy){
        bestAccuracy=p.coords.accuracy;
        gps={lat:p.coords.latitude,lng:p.coords.longitude,accuracy:Math.round(p.coords.accuracy)};
        // GPS bar 텍스트만 갱신 (render() 호출 없이 DOM 직접 업데이트 → 지도 유지)
        const gpsTxt=document.getElementById('gps-txt');
        if(gpsTxt) gpsTxt.textContent=`${gps.lat.toFixed(4)}°N, ${gps.lng.toFixed(4)}°E · ±${gps.accuracy}m`;
        updateGpsAddress();
      }
    },
    e=>{
      if(finished)return; finished=true;
      gpsLoading=false;render();
      if(e.code===1) showGpsHelp('denied');
      else if(e.code===2) showGpsHelp('unavailable');
      else showGpsHelp('timeout');
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );

  // 8초 후 가장 좋은 결과로 종료
  setTimeout(()=>{
    if(finished)return;
    if(gps&&gps.accuracy<Infinity){
      navigator.geolocation.getCurrentPosition(p=>finish(p),()=>finish(null),{enableHighAccuracy:true,timeout:5000});
    }else{
      navigator.geolocation.getCurrentPosition(p=>finish(p),e=>{
        finished=true;gpsLoading=false;
        if(e.code===1)showGpsHelp('denied');else showGpsHelp('timeout');
        render();
      },{enableHighAccuracy:true,timeout:8000});
    }
  },8000);
}

// ── 한국 영토 범위 체크 (해외 엉뚱한 좌표 차단) ──────────────
function isInKorea(lat,lng){
  return lat>=33.0&&lat<=39.0&&lng>=124.0&&lng<=132.0;
}

// ── 검색 결과명이 거래처와 진짜 일치하는지 엄격 판단 ──────────
// 판단 규칙:
//   ① 회사명 핵심(≥3자)이 결과명에 반드시 포함 — 없으면 즉시 거부
//   ② 지점명이 없으면 ①만으로 통과
//   ③ 지점명이 있으면 결과명에 지점명(또는 접미사 제거 후 위치키)도 포함되어야 통과
//      예) "서린동지점" → 위치키="서린동" / "금호본점" → 위치키="금호"
// ※ "검색어가 결과를 포함" 방향(norm.includes(disp)) 은 절대 사용 안 함
//    — 국민은행 본점이 검색돼도 "국민은행서린동지점".includes("국민은행")=true가 되어
//      엉뚱한 장소가 수락되는 버그의 원인이었음
function _isConfidentMatch(c, resultName){
  if(!resultName) return false;

  // 공백·괄호·법인명 표기 제거
  const strip=s=>(s||'').replace(/[\s\(\)\[\]㈜()]/g,'');
  const rn=strip(resultName);
  const cn=strip(c.companyName);    // 예: "새마을금고","국민은행"
  const bn=strip(c.branchName||''); // 예: "금호본점","서린동지점",""

  // ① 회사명이 결과명에 포함 (최소 3자 이상만 검사)
  if(cn.length<3||!rn.includes(cn)) return false;

  // ② 지점명 없으면 통과
  if(!bn) return true;

  // ③ 지점명 또는 위치키가 결과명에 포함
  //    접미사(지점/본점/지소/출장소/영업점/센터) 제거 → 위치 식별 키워드만 추출
  const locKey=bn.replace(/(지점|본점|지소|출장소|영업점|센터|점)$/,'');
  if(rn.includes(bn))             return true; // "서린동지점" 그대로 포함
  if(locKey.length>=2&&rn.includes(locKey)) return true; // "서린동" 포함
  return false;
}

// ── 거래처명으로 위치 검색 ─────────────────────────────────
// 검색 전략:
//   1순위: GAS 프록시 → 네이버 지역검색 REST API (업체명 검색 전용)
//   2순위: naver.maps.Service.geocode (주소 문자열 폴백 — 업체명은 미지원)
//
// ※ geocode()는 "주소 → 좌표" 전용이므로 "국민은행 서린동지점" 같은
//    업체명 쿼리로는 결과가 나오지 않음. 반드시 GAS localSearch 경로 우선 사용.
async function searchClientByName(id){
  const c=S.clients.find(x=>x.id===id);
  if(!c) return;

  const fullName=(c.companyName+(c.branchName?' '+c.branchName:'')).trim();
  toast(`"${fullName}" 위치 검색 중...`);

  const tryApply=(addr,lat,lng,src)=>{
    if(!isInKorea(lat,lng)){
      console.warn(`[Search] 한국 외 좌표 거부: (${lat},${lng}) src="${src}"`);
      return false;
    }
    set({clients:S.clients.map(x=>x.id===id?{...x,address:addr||x.address,lat,lng}:x)});
    toast(`✓ 위치 등록: ${fullName}`);
    if(page==='map'&&_nmap) placeMapMarkers();
    return true;
  };

  // ── 1순위: GAS 프록시 → 네이버 지역검색 REST API ─────────
  // GAS 측 구현 필요 (action:'localSearch'):
  //   UrlFetchApp.fetch('https://openapi.naver.com/v1/search/local.json?query='+encodeURIComponent(query)+'&display=3',
  //     {headers:{'X-Naver-Client-Id':NAVER_CLIENT_ID,'X-Naver-Client-Secret':NAVER_SECRET}})
  //   반환: {ok:true, data:{items:[{title,address,roadAddress,lat,lng}, ...]}}
  if(CFG.gasUrl){
    const locKey=c.branchName
      ? c.branchName.replace(/(지점|본점|지소|출장소|영업점|센터|지소장|점|지점장)$/,'').trim()
      : '';
    const gasQueries=[fullName];
    if(locKey&&locKey!==c.branchName) gasQueries.push(locKey+c.companyName);
    if(!c.branchName) gasQueries.push(c.companyName);

    for(const q of gasQueries){
      try{
        const res=await fetch(CFG.gasUrl,{
          method:'POST',
          headers:{'Content-Type':'text/plain'},
          body:JSON.stringify({action:'localSearch',user:S.user?.name||'',query:q})
        });
        if(res.ok){
          const json=await res.json();
          if(json.ok&&json.data?.items?.length){
            const item=json.data.items[0];
            const lat=parseFloat(item.lat||item.mapy);
            const lng=parseFloat(item.lng||item.mapx);
            const addr=item.roadAddress||item.address||'';
            // 기관명 일치 여부 확인 (HTML 태그 제거 후 비교)
            const rn=(item.title||'').replace(/<[^>]+>/g,'');
            const cn=(c.companyName||'').replace(/[\s㈜]/g,'');
            if(cn.length>=3&&!rn.includes(cn.slice(0,Math.min(cn.length,5)))){
              console.warn(`[GAS localSearch] 이름 불일치: "${rn}" vs "${cn}", q="${q}"`);
              continue;
            }
            if(tryApply(addr,lat,lng,'GAS/localSearch')) return;
          }
        }
      }catch(e){ console.warn('[GAS localSearch] 오류:', e); }
      await new Promise(r=>setTimeout(r,80));
    }
  }

  // ── 2순위: naver.maps.Service.geocode (주소 문자열 한정) ──
  // geocode는 업체명 검색을 지원하지 않으므로, 주소가 있거나
  // 지점명에서 추출한 위치키(지명) 한정으로만 시도
  if(!window.naver?.maps?.Service){
    toast('⚠ 지도 API 미초기화 — Client ID 및 서비스 URL 등록을 확인하세요'); return;
  }

  const geoQueries=[];
  if(c.address) geoQueries.push(c.address);
  if(c.branchName){
    const locKey=c.branchName.replace(/(지점|본점|지소|출장소|영업점|센터|지소장|점|지점장)$/,'').trim();
    if(locKey&&locKey.length>=2) geoQueries.push(locKey);
  }

  for(const q of geoQueries){
    const result=await new Promise(resolve=>{
      naver.maps.Service.geocode({query:q},(status,response)=>{
        if(status===naver.maps.Service.Status.OK&&response.v2?.addresses?.length)
          resolve(response.v2.addresses[0]);
        else{ console.warn(`[NaverGeo] "${q}" → ${status}`); resolve(null); }
      });
    });
    if(result){
      const lat=parseFloat(result.y), lng=parseFloat(result.x);
      const addr=result.roadAddress||result.jibunAddress||'';
      if(tryApply(addr,lat,lng,'geocode')) return;
    }
    await new Promise(r=>setTimeout(r,80));
  }

  toast('⚠ 위치를 찾을 수 없습니다 — 거래처 상세에서 주소를 직접 입력 후 재시도하세요');
}

// ── 주소 기반 Geocoding (주소가 있을 때 우선 사용) ────────────
async function geocodeClient(id){
  const c=S.clients.find(x=>x.id===id);
  if(!c) return;

  // 주소 없음 → 거래처명 검색으로 위임
  if(!c.address){
    if(CFG.mapsKey&&window.naver?.maps) return searchClientByName(id);
    toast('주소 정보가 없습니다'); return;
  }

  // 주소 있음 → Naver Maps Service.geocode (geocoder 서브모듈)
  if(CFG.mapsKey&&window.naver?.maps){
    toast('주소로 좌표 검색 중...');
    naver.maps.Service.geocode(
      {query:c.address},
      (status,response)=>{
        if(status===naver.maps.Service.Status.OK&&response.v2?.addresses?.length){
          const result=response.v2.addresses[0];
          const lat=parseFloat(result.y), lng=parseFloat(result.x);
          if(!isInKorea(lat,lng)){
            toast('⚠ 검색된 좌표가 한국 영역 밖입니다 — 주소를 확인해주세요');
            return;
          }
          const addr=result.roadAddress||result.jibunAddress||c.address;
          set({clients:S.clients.map(x=>x.id===id?{...x,address:addr,lat,lng}:x)});
          toast('✓ 좌표 등록됨 (주소)');
          if(page==='map'&&_nmap) placeMapMarkers();
        }else{
          // Geocode 실패 → 거래처명 검색으로 폴백
          console.warn('[NaverGeo] Geocode 실패, 거래처명 검색으로 폴백:', status);
          toast('주소 검색 실패 — 거래처명으로 재시도 중...');
          searchClientByName(id);
        }
      }
    );
  }else{
    toast('네이버 지도 Client ID가 설정되지 않았습니다');
  }
}

async function doMemberLogin(){
  const name=(document.getElementById('ln')?.value?.trim())||lf.name;
  if(!name){toast('담당자 이름을 입력하세요');return;}

  if(!CFG.gasUrl){
    // GAS 미설정 — 로컬 전용 모드
    _loginAsLocalMember(name); return;
  }
  lf.name=name;
  loginScreen='checking'; render();
  try{
    const res = await API.checkMember(name);
    if(res.status==='approved'||res.status==='admin'){
      _loginAsLocalMember(name);
    } else if(res.status==='pending'){
      loginScreen='pending'; render();
    } else {
      loginScreen='request'; render();
    }
  }catch(e){
    // 서버 오류 시 로컬 캐시된 승인 목록으로 폴백
    try{
      const cached=JSON.parse(localStorage.getItem('vl_hana_approved_cache')||'[]');
      if(cached.includes(name)){
        toast('⚠ 서버 연결 실패 — 오프라인 모드로 진입합니다');
        _loginAsLocalMember(name); return;
      }
    }catch{}
    toast('⚠ 서버에 연결할 수 없습니다. 잠시 후 다시 시도하세요.');
    loginScreen='select'; render();
  }
}

function _loginAsLocalMember(name){
  const userData = loadUserData(name) || {};
  S = {
    user:{name,role:'member'},
    clients: userData.clients || [],
    visits:  userData.visits  || [],
    cycles:  userData.cycles  || {...DEF_CYCLES},
    synced:  userData.synced  || false,
    syncedAt: null,
    shareEnabled: userData.shareEnabled ?? false,
  };
  saveSession(S.user);
  if(CFG.mapsKey)loadMapsScript();
  go('list');
  if(CFG.gasUrl) setTimeout(()=>doLoad(true), 600);
}

async function doRequestApproval(){
  const name=lf.name;
  if(!name)return;
  if(!CFG.gasUrl){loginScreen='pending';render();return;}
  loginScreen='checking'; render();
  try{
    await API.requestMember(name);
    loginScreen='pending'; render();
    toast('✓ 승인 요청이 전송됐습니다');
  }catch(e){
    loginScreen='request'; render();
    toast('요청 실패: '+e.message);
  }
}

async function doAdminLogin(){
  const pw=document.getElementById('apw')?.value||'';
  if(!pw){toast('비밀번호를 입력하세요');return;}
  const hash=await sha256(pw);
  if(hash!==CFG.adminPwHash){toast('비밀번호가 틀렸습니다');return;}

  // 관리자 데이터 로드
  const adminName='관리자';
  const userData = loadUserData(adminName) || {};
  S = {
    user:{name:adminName,role:'admin'},
    clients: userData.clients || [],
    visits:  userData.visits  || [],
    cycles:  userData.cycles  || {...DEF_CYCLES},
    synced:  userData.synced  || false,
    syncedAt: null,
    shareEnabled: userData.shareEnabled ?? false,
  };
  saveSession(S.user);
  if(CFG.mapsKey)loadMapsScript();
  render();
  go('team');  // 관리자는 팀원 현황 화면으로
  setTimeout(()=>toast('✓ 관리자로 로그인됐습니다'),200);
  if(CFG.gasUrl) setTimeout(()=>_refreshMembers(), 400); // 팀원 목록 자동 로드
}

async function doSetAdminPw(){
  const pw=document.getElementById('npw1')?.value||'';
  const pw2=document.getElementById('npw2')?.value||'';
  if(!pw||pw.length<4){toast('비밀번호는 4자 이상이어야 합니다');return;}
  if(pw!==pw2){toast('비밀번호가 일치하지 않습니다');return;}
  const hash=await sha256(pw);
  CFG={...CFG,adminPwHash:hash};
  saveCfg(CFG);
  set({user:{name:'관리자',role:'admin',spreadsheetId:null}});
  go('settings');
  setTimeout(()=>toast('✓ 비밀번호 설정 완료. 이제 API 키를 설정해주세요'),200);
}

        style="width:100%;background:#1C2E42;border:1px solid rgba(59,158,255,.5);border-radius:8px;color:#EDF2F7;font-family:'Noto Sans KR',sans-serif;font-size:14px;padding:11px 12px;outline:none;margin-bottom:14px;box-sizing:border-box"

        <button onclick="this.closest('div[style*=fixed]').remove()"
          style="flex:1;padding:12px;background:#1C2E42;color:#8BAABF;border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer">취소</button>
        <button id="ef_ok_${field}" onclick="(function(){
          const val=document.getElementById('${inputId}')?.value||'';
          const ovl=document.querySelector('[data-ef-overlay]');
          if(ovl)ovl.remove();
          _applyEditField('${clientId}','${field}','${label}',val);
        })()"
          style="flex:2;padding:12px;background:#3B9EFF;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer">확인</button>
      </div>
    </div>`;

  setTimeout(()=>{const inp=document.getElementById(inputId);if(inp)inp.focus();},80);
}
function _applyEditField(clientId, field, label, val){
  // data-ef-overlay 제거 (혹시 남아있으면)
  document.querySelectorAll('[data-ef-overlay]').forEach(el=>el.remove());
  set({clients:S.clients.map(x=>x.id===clientId?{...x,[field]:val.trim()}:x)});
  _autoSync('✓ '+label+' 수정됨');
}
function delClient(id){
  if(!confirm('삭제하시겠습니까?'))return;
  set({clients:S.clients.filter(c=>c.id!==id),visits:S.visits.filter(v=>v.clientId!==id)});
  go('list');
  _autoSync('삭제됐습니다');
}

      </div>

async function saveVisit(cid){
  if(!vf.date){toast('방문일을 선택하세요');return;}
  const v={id:uid(),clientId:cid,type:vf.type,memo:vf.memo,
    date:vf.date,createdAt:new Date().toISOString()};
  // 가장 최근 방문일을 lastVisitDate로 (과거 방문 추가해도 최신값 유지)
  const allVisits=[...S.visits,v].filter(x=>x.clientId===cid);
  const latest=allVisits.map(x=>x.date).sort().reverse()[0];
  const clients=S.clients.map(c=>c.id===cid?{...c,lastVisitDate:latest}:c);
  set({clients,visits:[...S.visits,v]});
  vf={type:'단순 방문',memo:'',date:''};
  if(CFG.gasUrl){try{await API.save();toast('✓ 저장 + 서버 동기화');}catch{toast('✓ 로컬 저장됨 (서버 오류)');}}
  else toast('✓ 방문 기록 저장됨');
  go('detail',cid);
}

/* ── MAP ── */
// 지도 하단 탭: 'nearby'(근처) | 'bank'(은행별)
let mapTab='nearby';

function PageMap(){
  const withCoord = S.clients.filter(c=>c.lat&&c.lng);
  const noCoord   = S.clients.filter(c=>!c.lat);

  // ── 근처 거래처 (GPS 기반) ───────────────────────────────
  const nearby = gps
    ? withCoord
        .map(c=>({...c,dist:hav(gps.lat,gps.lng,c.lat,c.lng),u:getU(c)}))
        .filter(c=>c.dist<=mapRadius)
        .sort((a,b)=>a.dist-b.dist)
    : [];

  // ── 은행별 그룹 목록 (companyName → branchName 정렬) ─────
  const bankGroups = {};
  withCoord
    .map(c=>({...c,u:getU(c)}))
    .sort((a,b)=>{
      const cmp = a.companyName.localeCompare(b.companyName,'ko');
      if(cmp!==0) return cmp;
      return (a.branchName||'').localeCompare(b.branchName||'','ko');
    })
    .forEach(c=>{
      const key = c.companyName;
      if(!bankGroups[key]) bankGroups[key]=[];
      bankGroups[key].push(c);
    });

  // 탭 내용 ──────────────────────────────────────────────
  const tabNearby = `
    <div id="nearby-label" class="slbl">근처 거래처 ${gps?`(${nearby.length}곳 / 반경 ${mapRadius}m)`:''}</div>
    <div id="nearby-list">
    ${!gps?`<div style="text-align:center;padding:18px;font-size:12px;color:var(--tx3)">📍 위치 인식 버튼을 눌러주세요</div>`:''}
    ${gps&&!nearby.length?`<div style="text-align:center;padding:18px;font-size:12px;color:var(--tx3)">주변 ${mapRadius}m 내 거래처가 없습니다</div>`:''}
    ${nearby.map(c=>`
      <div class="card cc ${c.u.cls}" onclick="go('detail','${c.id}')">
        <div class="cs"></div>
        <div class="cb">
          <div class="cn">${c.companyName}${c.branchName?' '+c.branchName:''}</div>
          <div class="cm">${c.dist}m · ${c.u.lbl} ${c.u.dd}</div>
        </div>
        <button class="btn bp bsm" onclick="event.stopPropagation();go('visit','${c.id}')">방문</button>
      </div>`).join('')}
    </div>`;

  const urgIcon = cls => cls==='u-r'?'🔴':cls==='u-o'?'🟠':cls==='u-y'?'🟡':'🟢';

  const tabBank = Object.keys(bankGroups).length===0
    ? `<div style="text-align:center;padding:28px;font-size:12px;color:var(--tx3)">좌표가 등록된 거래처가 없습니다<br><span style="font-size:11px">거래처 상세에서 좌표 검색 또는 설정 → 일괄 좌표 검색</span></div>`
    : Object.entries(bankGroups).map(([bank, list])=>{
        // 가장 위험한 상태로 그룹 뱃지 색상 결정
        const worst = list.reduce((a,c)=>c.u.pct>a.u.pct?c:a, list[0]);
        const wColor = worst.u.cls==='u-r'?'var(--red)':worst.u.cls==='u-o'?'var(--or)':worst.u.cls==='u-y'?'var(--yw)':'var(--gn)';
        return `
      <div style="margin:0 14px 2px">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 2px 4px">
          <div style="font-size:13px;font-weight:700;color:var(--tx);flex:1">${bank}</div>
          <div style="font-size:10px;font-weight:700;color:${wColor};background:rgba(0,0,0,.08);padding:2px 8px;border-radius:10px">${list.length}곳</div>
        </div>
        ${list.map(c=>`
        <div class="card cc ${c.u.cls}" style="margin:0 0 6px" onclick="go('detail','${c.id}')">
          <div class="cs"></div>
          <div class="cb">
            <div class="cn">${c.branchName||c.companyName}</div>
            <div class="cm">${c.address||'주소 미등록'}</div>
          </div>
          <div class="cr">
            <div class="dd">${c.u.lbl}</div>
            <div style="font-size:10px;color:var(--tx3);font-family:var(--mo)">${c.u.dd}</div>
          </div>
        </div>`).join('')}
      </div>`;
      }).join('');

  return`
  <div class="hdr">
    <div class="hdr-row">
      <div><div class="hdr-t">지도</div><div class="hdr-s">네이버 지도 · ${withCoord.length}곳 표시</div></div>
      <button class="btn bs bsm" onclick="reqGPS()" style="min-width:80px">
        ${gpsLoading?'<div class="spin"></div>':'📍 위치 인식'}</button>
    </div>
  </div>
  <div class="page">
    ${gps?`<div class="gpb"><div class="gpd"></div><span id="gps-txt">${gps.lat.toFixed(4)}°N, ${gps.lng.toFixed(4)}°E${gps.accuracy?` · ±${gps.accuracy}m`:''}</span></div>`:''}
    ${CFG.mapsKey?'':'<div style="padding:8px 14px;font-size:11px;color:var(--tx3);background:var(--rbg);border-bottom:1px solid var(--bd)">⚠ 네이버 지도 Client ID 미설정 — 설정에서 입력하면 지도가 표시됩니다</div>'}
    <div id="gmap" style="display:${CFG.mapsKey?'block':'none'}"></div>

    ${CFG.mapsKey?`
    <div class="card" style="margin-top:0;margin-bottom:8px;padding:10px 14px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11.5px;color:var(--tx2);flex-shrink:0">표시 반경</span>
        <input type="range" min="100" max="5000" step="100" value="${mapRadius}"
          oninput="mapRadius=parseInt(this.value);document.getElementById('map-rv').textContent=mapRadius+'m';_refreshNearby()"
          onchange="render()" style="flex:1;accent-color:var(--ac)">
        <span id="map-rv" style="font-family:var(--mo);font-size:12px;min-width:46px;text-align:right;color:var(--ac)">${mapRadius}m</span>
      </div>
    </div>`:''}

    <div class="chips" style="padding:4px 14px 8px">
      <div class="chip ${mapTab==='nearby'?'on':''}" onclick="mapTab='nearby';render()">📍 근처 거래처</div>
      <div class="chip ${mapTab==='bank'?'on':''}" onclick="mapTab='bank';render()">🏦 은행별 조회</div>
    </div>

    ${mapTab==='nearby' ? tabNearby : tabBank}

    ${noCoord.length?`
    <div style="margin:8px 14px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0 4px">
        <span style="font-size:10.5px;font-weight:700;color:var(--tx3);letter-spacing:.05em">좌표 미등록 (${noCoord.length}곳)</span>
        <button class="btn bs bsm" onclick="doBatchGeo()">일괄 좌표 검색</button>
      </div>
      ${noCoord.slice(0,5).map(c=>`
      <div class="card row jb" style="padding:9px 12px;margin-bottom:6px">
        <div style="font-size:12px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;color:var(--tx2)">${c.companyName}${c.branchName?' '+c.branchName:''}</div>

      </div>`).join('')}
      ${noCoord.length>5?`<div style="text-align:center;padding:6px 0 10px;font-size:11px;color:var(--tx3)">외 ${noCoord.length-5}곳</div>`:''}
    </div>`:''}
  </div>`;
}

let histF='전체';

  const all=[...S.visits].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filtered=histF==='전체'?all:all.filter(v=>v.type===histF);
  const groups={};filtered.forEach(v=>{const k=v.date.slice(0,7);(groups[k]||(groups[k]=[])).push(v);});
  const tc=VISIT_TYPES.reduce((a,t)=>{a[t]=S.visits.filter(v=>v.type===t).length;return a},{});
  return`
  <div class="hdr">
    <div class="hdr-row">
      <div><div class="hdr-t">방문 히스토리</div><div class="hdr-s">총 ${S.visits.length}건</div></div>
    </div>
  </div>
  <div class="page">
    <div class="sr">
      <div class="sc"><div class="sn" style="color:var(--ac)">${S.visits.length}</div><div class="sl">총 방문</div></div>
      <div class="sc"><div class="sn" style="color:var(--red)">${S.clients.filter(c=>getU(c).pct>=91).length}</div><div class="sl">위험 거래처</div></div>
    </div>
    <div class="chips"><div class="chip ${histF==='전체'?'on':''}" onclick="histF='전체';render()">전체</div>

    ${!Object.keys(groups).length?`<div class="empty">
      <svg width="44" height="44" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2" color="var(--tx3)"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <h3>방문 기록 없음</h3><p>거래처를 방문하고 기록을 남겨보세요</p></div>`:''}
    ${Object.entries(groups).map(([ym,vs])=>`
    <div class="slbl">${ym.replace('-','년 ')}월</div>

      <div class="hd" style="background:${v.type==='신규 개척'?'var(--red)':v.type==='기존 거래처 관리'?'var(--gn)':'var(--ac)'}"></div>
      <div class="hb">
        <div class="row jb">
          <div class="ht">${c?c.companyName+(c.branchName?' '+c.branchName:''):'(삭제됨)'}</div>
          <span style="font-size:10px;color:var(--tx3);font-family:var(--mo)">${v.date}</span>
        </div>
        <div class="hm">${v.type}</div>
        ${v.memo?`<div class="hme">${v.memo}</div>`:''}
      </div>
    </div>`;}).join('')}`).join('')}
  </div>`;
}

function handleDrop(e){
  const file=e.dataTransfer?.files?.[0];
  if(!file)return;
  // 가상 input으로 전달
  const dt=new DataTransfer();
  dt.items.add(file);
  const inp=document.getElementById('imp2');
  if(inp){inp.files=dt.files;onImportFile(inp);}
}

function onImportFile(input){
  const f=input.files[0];if(!f)return;
  const ext=f.name.split('.').pop().toLowerCase();
  const r=new FileReader();

  function processRows(rows){
    // 빈 행 제거
    const cleaned=rows.filter(row=>row.some(cell=>cell!=null&&String(cell).trim()!==''));
    const parsed=parseRows(cleaned);

    // 헤더 감지 결과 디버그용
    let headerRowIdx=0;
    for(let i=0;i<Math.min(cleaned.length,5);i++){
      const MAP_KEYS=['회사명','업체명','거래처명','거래처','기관명','의뢰처','의뢰기관','금융기관','금융기관명',
        '지점명','지점','의뢰부서','담당자','의뢰담당','전화','연락처','주소','소재지',
        '카테고리','분류','업무구분','담당직원','팀','접수일자','발송일자'];
      const row=cleaned[i];
      const matched=row.filter(h=>MAP_KEYS.includes(String(h||'').trim()));
      if(matched.length>=2){headerRowIdx=i;break;}
    }
    const detectedHeaders=cleaned[headerRowIdx]||[];

    importState={...importState,rows:cleaned,parsed,importing:false,progress:'',
      _headerRow:detectedHeaders,_headerIdx:headerRowIdx};
    render();
  }

  if(ext==='csv'){
    // UTF-8로 먼저 읽고, 깨진 문자(?) 비율이 5% 이상이면 EUC-KR로 재시도
    r.onload=e=>{
      const text=e.target.result;
      const questionMarks=(text.match(/\?/g)||[]).length;
      if(text.length>0 && questionMarks/text.length>=0.05){
        // EUC-KR로 재읽기
        const r2=new FileReader();
        r2.onload=e2=>{
          const rows2=e2.target.result.split('\n').map(l=>l.split(',').map(c=>c.replace(/^"|"$/g,'').trim()));
          processRows(rows2);
        };
        r2.onerror=()=>{ toast('파일 읽기 오류 — 다시 시도해주세요'); };
        r2.readAsText(f,'EUC-KR');
        return;
      }
      const rows=text.split('\n').map(l=>l.split(',').map(c=>c.replace(/^"|"$/g,'').trim()));
      processRows(rows);
    };
    r.readAsText(f,'utf-8');
  }else{
    r.onload=e=>{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',codepage:949});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      processRows(rows);
    };
    r.readAsArrayBuffer(f);
  }
}

async function doImportConfirm(){
  const fresh=importState.parsed.filter(c=>!S.clients.some(x=>sim(x.companyName,c.companyName)>0.85));
  if(!fresh.length){toast('추가할 신규 거래처가 없습니다');return;}

  importState={...importState,importing:true,progress:'데이터 저장 중...'};render();
  set({clients:[...S.clients,...fresh]},true);
  saveUserData(S.user?.name||'guest',{clients:S.clients,visits:S.visits,cycles:S.cycles,synced:S.synced,shareEnabled:S.shareEnabled});

  // 네이버 지도 API가 로드되어 있으면 자동 좌표 검색 (백그라운드)
  if(CFG.mapsKey&&window.naver?.maps){
    importState.progress=`좌표 자동 검색 중... (0/${fresh.length})`;render();
    let done=0;
    for(const c of fresh){
      await (async()=>{
        try{
          const query=c.address||(c.companyName+(c.branchName?' '+c.branchName:''));
          await new Promise(resolve=>{
            naver.maps.Service.geocode({query},(status,response)=>{
              if(status===naver.maps.Service.Status.OK&&response.v2?.addresses?.length){
                const result=response.v2.addresses[0];
                const lat=parseFloat(result.y), lng=parseFloat(result.x);
                if(isInKorea(lat,lng)){
                  const addr=result.roadAddress||result.jibunAddress||c.address||'';
                  const idx=S.clients.findIndex(x=>x.id===c.id);
                  if(idx>=0) S.clients[idx]={...S.clients[idx],address:addr,lat,lng};
                }
              }
              resolve();
            });
          });
        }catch(e){ console.warn('네이버 Geocode 오류 (스킵):', c.companyName, e); }
      })();
      done++;
      importState.progress=`좌표 자동 검색 중... (${done}/${fresh.length})`;
      render();
      await new Promise(r=>setTimeout(r,150)); // rate limit
    }
    // 루프 완료 후 상태 일관성 보장
    set({clients:S.clients},true);
    saveUserData(S.user?.name||'guest',{clients:S.clients,visits:S.visits,cycles:S.cycles,synced:S.synced,shareEnabled:S.shareEnabled});
  }

  if(CFG.gasUrl){
    try{
      importState.progress='서버에 동기화 중...';render();
      await API.save(p=>{importState.progress=p;render();});
      importState={rows:null,parsed:null,preview:null,importing:false,progress:''};
      toast(`✓ ${fresh.length}개 거래처 추가 및 서버 저장 완료`);
    }catch(e){
      importState={rows:null,parsed:null,preview:null,importing:false,progress:''};
      toast(`✓ ${fresh.length}개 추가됨 (Sheets 오류: ${e.message})`);
    }
  }else{
    importState={rows:null,parsed:null,preview:null,importing:false,progress:''};
    toast(`✓ ${fresh.length}개 거래처 추가됨`);
  }
  go('list');
}

async function doImportShared(){
  const name=document.getElementById('share_name')?.value?.trim();
  if(!name){toast('팀원 이름을 입력하세요');return;}
  if(!CFG.gasUrl){toast('서버 URL이 설정되지 않았습니다');return;}
  toast(`${name}의 거래처 불러오는 중...`);
  try{
    const shared = await API.getShared(name);
    if(!shared.length){
      alert(`⚠ ${name}님이 거래처 공유를 허용하지 않았거나\n거래처 목록이 비어있습니다.\n\n해당 팀원에게 [설정 → 내 거래처 공유 설정]을 켜달라고 요청하세요.`);
      return;
    }
    const me=S.user?.name||'';
    const withDup=shared.map(c=>({
      ...c,
      _dup: S.clients.some(x=>!x._shared&&x.ownerName===me&&sim(x.companyName,c.companyName)>0.75)
    }));
    const existing=S.clients.filter(c=>!(c._sharedFrom===name));
    set({clients:[...existing,...withDup]});
    toast(`✓ ${name}의 거래처 ${withDup.length}개 공유됨`);
  }catch(e){
    if(/not found|404/i.test(e.message)){
      alert(`⚠ ${name}님의 거래처 시트를 찾을 수 없습니다.`);
    }else{
      toast('오류: '+e.message);
    }
  }
}

function onCardFile(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    // 카메라 원본(수MB) → 1200px / JPEG 0.85 압축 후 전송 (Vision API 권장 해상도)
    const img=new Image();
    img.onload=()=>{
      const MAX=1200;
      let w=img.width,h=img.height;
      if(w>h){ if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} }
      else   { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=cv.toDataURL('image/jpeg',0.85).split(',')[1];
      const origKB=Math.round(e.target.result.length*0.75/1024);
      const compKB=Math.round(compressed.length*0.75/1024);
      console.log(`명함 압축: ${origKB}KB → ${compKB}KB (${w}×${h}px)`);
      sc={step:1,b64:compressed,parsed:null,loading:false,err:null,progress:''};render();
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f);
}
async function doScanAI(){
  sc={...sc,loading:true,err:null,progress:'AI 명함 분석 중...'};render();
  try{
    const p=await ClaudeAI.card(sc.b64,(msg)=>{sc={...sc,progress:msg};render();});
    sc={...sc,step:2,parsed:p,loading:false,progress:''};
  }catch(e){
    const errMsg = e.message || 'AI 인식 실패. 직접 입력해 주세요.';
    sc={...sc, loading:false, err:errMsg, progress:'', step:1};
  }
  render();
}
function resetScan(){sc={step:0,b64:null,parsed:null,loading:false,err:null,progress:''};render();}
function saveVCF_scan(){
  const p=sc.parsed;if(!p)return;
  const name=[p.contactName,p.contactTitle].filter(Boolean).join(' ');
  const vcard=[
    'BEGIN:VCARD','VERSION:3.0',
    `FN:${name||p.companyName}`,
    `ORG:${p.companyName}${p.branchName?' '+p.branchName:''}`,
    p.contactTitle?`TITLE:${p.contactTitle}`:'',
    p.contactPhone?`TEL;TYPE=WORK:${p.contactPhone}`:'',
    p.email?`EMAIL:${p.email}`:'',
    p.address?`ADR;TYPE=WORK:;;${p.address};;;`:'',
    'END:VCARD'
  ].filter(Boolean).join('\r\n');
  const blob=new Blob([vcard],{type:'text/vcard;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${name||p.companyName}.vcf`;
  a.click();
  toast('✓ 연락처 저장 파일 다운로드됨');
}

function doLogout(){
  if(!confirm('로그아웃 하시겠습니까?'))return;
  saveSession(null);
  S = {user:null, clients:[], visits:[], cycles:{...DEF_CYCLES}, synced:false, syncedAt:null};
  loginScreen='select';lf={name:'',pw:'',newPw:'',newPw2:''};
  render();
}

async function doApproveMember(name){
  try{await API.approveMember(name);toast(`✓ ${name} 승인됨`);await _refreshMembers();}
  catch(e){toast('오류: '+e.message);}
}

async function doRejectMember(name){
  if(!confirm(`${name}의 요청을 거절하시겠습니까?`))return;
  try{await API.rejectMember(name);toast(`${name} 거절됨`);await _refreshMembers();}
  catch(e){toast('오류: '+e.message);}
}

async function doRemoveMember(name){
  if(!confirm(`${name}님을 팀원에서 제거하시겠습니까?`))return;
  try{await API.removeMember(name);toast(`${name} 제거됨`);await _refreshMembers();}
  catch(e){toast('오류: '+e.message);}
}

async function doAddMember(){
  const name=document.getElementById('add_member')?.value?.trim();
  if(!name){toast('이름을 입력하세요');return;}
  try{
    await API.addMember(name);
    toast(`✓ ${name} 추가됨`);
    const el=document.getElementById('add_member'); if(el)el.value='';
    await _refreshMembers();
  }catch(e){toast('오류: '+e.message);}
}

let _cachedMembers={approved:[],pending:[]};
async function _refreshMembers(){
  try{
    _cachedMembers=await API.getMembers();
    const names=(_cachedMembers.approved||[]).map(m=>m.name);
    localStorage.setItem('vl_hana_approved_cache', JSON.stringify(names));
  }catch(e){ console.warn('팀원 목록 로드 실패:', e.message); }
  render();
}

function doClearClients(){
  if(!confirm('거래처 목록과 방문 기록을 모두 삭제합니다.\n(설정·팀원 정보는 유지됩니다) 계속하시겠습니까?'))return;
  set({clients:[],visits:[]});
  toast('거래처 목록이 초기화됐습니다');
}

async function doCreateMaster(){
  if(!CFG.gasUrl){alert('GAS 서버 URL이 설정되지 않았습니다');return;}
  if(!confirm('전체 팀원 데이터를 통합 시트로 만들거나 갱신합니다.\n계속하시겠습니까?'))return;
  syncProgress='준비 중...';render();
  syncProgress='서버 시트 조회 중...';render();
  try{
    const r = await API.call('getSheetInfo');
    syncProgress='';render();
    if(confirm(`서버 스프레드시트\n\n${r.ssUrl}\n\n바로 열어보시겠습니까?`)){
      window.open(r.ssUrl,'_blank');
    }
  }catch(e){
    syncProgress='';render();
    alert('오류: '+e.message);
  }
}

function saveMapsKey(){
  const key=document.getElementById('s_mk')?.value?.trim()||'';
  CFG={...CFG,mapsKey:key};saveCfg(CFG);
  const old=document.getElementById('nmaps-script');if(old)old.remove();
  if(key)loadMapsScript();
  toast('✓ 네이버 지도 Client ID 저장됨');
}

function saveGeminiKey(){
  const key=document.getElementById('s_gk')?.value?.trim()||'';
  const model=(document.getElementById('s_gm')?.value?.trim()||GEMINI_MODEL_DEFAULT);
  CFG={...CFG,geminiKey:key,geminiModel:model};saveCfg(CFG);
  toast(key?`✓ Gemini 키 저장됨 · 모델: ${model}`:'Gemini 키가 삭제됐습니다');
  render();
}

async function doChangePw(){
  const cur=document.getElementById('pw_cur')?.value||'';
  const nw=document.getElementById('pw_new')?.value||'';
  const nw2=document.getElementById('pw_new2')?.value||'';
  if(!cur){toast('현재 비밀번호를 입력하세요');return;}
  const curHash=await sha256(cur);
  if(curHash!==CFG.adminPwHash){toast('현재 비밀번호가 틀렸습니다');return;}
  if(!nw||nw.length<4){toast('새 비밀번호는 4자 이상이어야 합니다');return;}
  if(nw!==nw2){toast('새 비밀번호가 일치하지 않습니다');return;}
  CFG={...CFG,adminPwHash:await sha256(nw)};saveCfg(CFG);
  toast('✓ 비밀번호가 변경됐습니다');
}

async function doSaveGasUrl(){
  const url=(document.getElementById('s_gas_url')?.value||'').trim();
  if(!url){toast('GAS URL을 입력하세요');return;}
  // 즉시 CFG 저장 + 화면 갱신 (연결 확인과 무관하게)
  CFG={...CFG,gasUrl:url};
  saveCfg(CFG);
  render();
  toast('URL 저장됨 — 서버 연결 확인 중...');
  try{
    await API.ping();
    toast('✓ 서버 연결 확인됨');
    render();
  }catch(e){
    const msg = e.message||String(e);
    if(msg.includes('CORS')||msg.includes('Failed to fetch')||msg.includes('NetworkError')){
      toast('⚠ URL 저장됨 (CORS 오류 — GAS 배포 설정 확인 필요)');
    } else {
      toast('⚠ URL 저장됨 (서버 확인 실패: '+msg+')');
    }
    render();
  }
}

async function doSync(){
  if(!isOnline()){enqueueOfflineSync('sync');toast('📡 오프라인 — 온라인 복귀 시 저장됩니다');return;}
  if(!CFG.gasUrl){toast('서버 URL이 설정되지 않았습니다');return;}
  syncProgress='저장 중...';render();
  try{
    await API.save(p=>{syncProgress=p;render();});
    syncProgress='';toast('✓ 서버에 저장 완료');render();
  }catch(e){
    syncProgress='';render();
    if(/network|fetch|failed/i.test(e.message)){enqueueOfflineSync('sync');toast('⚠ 저장 실패 — 온라인 복귀 시 재시도');}
    else toast('저장 실패: '+e.message);
  }
}
async function doLoad(silent=false){
  if(!CFG.gasUrl){if(!silent)toast('서버 URL이 설정되지 않았습니다');return;}
  syncProgress='불러오는 중...';render();
  try{
    const r=await API.load(p=>{syncProgress=p;render();});
    syncProgress='';render();
    if(r.clientCount===0){
      if(!silent)alert('서버에 저장된 거래처가 없습니다.\n먼저 [서버 저장] 버튼으로 데이터를 올려주세요.');
    }else{
      toast(`✓ 거래처 ${r.clientCount}개, 방문 ${r.visitCount}건 불러옴`);
    }
  }catch(e){
    syncProgress='';render();
    if(!silent)toast('불러오기 실패: '+e.message);
  }
}

function adjCycle(cat,d){set({cycles:{...S.cycles,[cat]:Math.max(5,Math.min(365,(S.cycles[cat]||30)+d))}}); }

function doImport(input){
  const f=input.files[0];if(!f)return;
  const ext=f.name.split('.').pop().toLowerCase();
  const r=new FileReader();
  if(ext==='csv'){r.onload=e=>{importRows(e.target.result.split('\n').map(l=>l.split(',').map(c=>c.replace(/^"|"$/g,'').trim())));};r.readAsText(f,'utf-8');}
  else{r.onload=e=>{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});importRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1}));};r.readAsArrayBuffer(f);}
}
function importRows(rows){
  const parsed=parseRows(rows);if(!parsed.length){toast('헤더를 확인하세요');return;}
  const fresh=parsed.filter(p=>!S.clients.some(c=>sim(c.companyName,p.companyName)>0.85));
  set({clients:[...S.clients,...fresh]});
  toast(`✓ ${fresh.length}개 추가 (중복 ${parsed.length-fresh.length}개 제외)`);
  if(CFG.gasUrl)setTimeout(()=>doSync(),800);
}
async function doAIParse(){

      contactName:p.contactName||'',contactPhone:p.contactPhone||'',address:p.address||'',

    })).filter(c=>c.companyName);
    set({clients:[...S.clients,...fresh]});toast(`✓ ${fresh.length}개 추가됨`);

}
function toggleShare(){
  set({shareEnabled: !S.shareEnabled});

}

function makeConfigLink(){
  const data={};
  if(CFG.gasUrl)     data.gu=CFG.gasUrl;
  if(CFG.mapsKey)    data.mk=CFG.mapsKey;
  if(CFG.geminiKey)  data.gk=CFG.geminiKey;
  if(CFG.adminPwHash)data.ph=CFG.adminPwHash;
  const b64=encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(data)))));
  const base=window.location.origin+window.location.pathname;
  return `${base}?cfg=${b64}`;
}

function copyConfigLink(){
  const link=document.getElementById('cfgLink')?.value||makeConfigLink();
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(link).then(
      ()=>toast('✓ 링크 복사됨 — 모바일 Chrome 주소창에 붙여넣기'),
      ()=>fallbackCopy(link)
    );
  }else fallbackCopy(link);
}

function fallbackCopy(text){
  const t=document.createElement('textarea');t.value=text;
  document.body.appendChild(t);t.select();
  try{document.execCommand('copy');toast('✓ 링크 복사됨');}
  catch{toast('복사 실패 — 수동으로 선택해주세요');}
  document.body.removeChild(t);
}

function doReclassify(){
  let changed=0;
  const updated=S.clients.map(c=>{
    const newCat=autoCat(c.companyName+(c.branchName?' '+c.branchName:''));
    if(newCat!==c.category){changed++;return{...c,category:newCat};}
    return c;
  });
  set({clients:updated});
  toast(`✓ ${changed}개 거래처 카테고리 재분류됨`);
}

async function doBatchGeo(){
  const targets=S.clients.filter(c=>c.address&&!c.lat);
  if(!targets.length){toast('좌표 없는 거래처가 없습니다');return;}
  toast(`${targets.length}개 좌표 검색 중...`);
  let done=0;
  for(const c of targets){
    try{
      if(CFG.mapsKey&&window.naver?.maps){
        await new Promise(res=>{
          naver.maps.Service.geocode({query:c.address},(status,response)=>{
            if(status===naver.maps.Service.Status.OK&&response.v2?.addresses?.length){
              const result=response.v2.addresses[0];
              const lat=parseFloat(result.y), lng=parseFloat(result.x);
              if(isInKorea(lat,lng)){
                S.clients=S.clients.map(x=>x.id===c.id?{...x,lat,lng}:x);done++;
              }
            }
            res();
          });
        });
      }else{
        const{lat,lng}=await Gem.geocode(c.address);
        S.clients=S.clients.map(x=>x.id===c.id?{...x,lat,lng}:x);done++;
      }
    }catch{}
    await new Promise(r=>setTimeout(r,500));
  }
  saveUserData(S.user?.name||'guest',{clients:S.clients,visits:S.visits,cycles:S.cycles,synced:S.synced,shareEnabled:S.shareEnabled});render();
  toast(`✓ ${done}/${targets.length}개 좌표 등록됨`);
  if(page==='map'&&_nmap)placeMapMarkers();
}
function doExport(){
  const blob=new Blob([JSON.stringify({clients:S.clients,visits:S.visits,cycles:S.cycles},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`visitlog_${S.user?.name||'data'}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function doClear(){if(!confirm('모든 데이터를 삭제하시겠습니까?'))return;set({clients:[],visits:[],cycles:{...DEF_CYCLES}});toast('초기화됨');go('list');}

  else if(page==='visit')    content=PageVisit();
  else if(page==='map')      content=PageMap();
  else if(page==='history')  content=PageHistory();
  else if(page==='scan')     content=PageScan();

  root.innerHTML=`

      <div class="ni ${page==='team'?'on':''}" onclick="go('team')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="${page==='team'?2:1.5}"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>팀원</div>
      <div class="nf">
        <button class="fab" onclick="go('scan')">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        </button>
      </div>

        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="${page==='map'?2:1.5}"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>지도</div>
      <div class="ni ${page==='settings'?'on':''}" onclick="go('settings')">

    </nav>`;

      _addGpsMarker();

  } else if(page==='map'){
    if(CFG.mapsKey&&!window.naver?.maps) loadMapsScript();
    else if(window.naver?.maps) scheduleInitGMap(); // ← 반드시 async(setTimeout 0)로 호출

  if(page==='detail'){

// ── PWA: 오프라인 감지 + Sync 재시도 큐 ────────────────────
const OFFLINE_QUEUE_KEY = 'vl_hana_offline_queue';

function isOnline(){ return navigator.onLine; }

// 오프라인 배너 표시/숨김
function updateOfflineBanner(){
  let banner=document.getElementById('offline-banner');
  if(!isOnline()){
    if(!banner){
      banner=document.createElement('div');
      banner.id='offline-banner';
      banner.className='offline-banner';
      banner.textContent='📡 오프라인 상태 — 데이터는 기기에 저장됩니다. 온라인 복귀 시 자동 동기화됩니다.';
      document.body.prepend(banner);
    }
  } else {
    if(banner) banner.remove();
    // 온라인 복귀 시 큐에 남은 sync 작업 처리
    retryOfflineQueue();
  }
}

// Sync 실패 시 큐에 적재 (재시도 대상: 'sync' | 'visit')
function enqueueOfflineSync(type='sync'){
  try{
    const q=JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY)||'[]');
    if(!q.includes(type)){ q.push(type); localStorage.setItem(OFFLINE_QUEUE_KEY,JSON.stringify(q)); }
  }catch{}
}

// 온라인 복귀 시 큐 소비
async function retryOfflineQueue(){
  if(!S.user||!CFG.gasUrl) return;
  try{
    const q=JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY)||'[]');
    if(!q.length) return;
    localStorage.removeItem(OFFLINE_QUEUE_KEY);
    toast('📡 온라인 복귀 — 저장 중...');
    await API.save();
    toast('✓ 오프라인 데이터 동기화 완료');
  }catch(e){ console.warn('오프라인 큐 재시도 실패:', e); }
}

window.addEventListener('online',  ()=>{ updateOfflineBanner(); });
window.addEventListener('offline', ()=>{ updateOfflineBanner(); });

// ── URL 파라미터로 설정 자동 적용 (모바일 공유용)
(function applyURLConfig(){
  try{
    const params=new URLSearchParams(window.location.search);
    const cfgB64=params.get('cfg');
    if(!cfgB64)return;
    const decoded=JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(cfgB64)))));
    let changed=[];
    if(decoded.gu && decoded.gu!==CFG.gasUrl){
      CFG={...CFG,gasUrl:decoded.gu};changed.push('서버 GAS URL');
    }
    if(decoded.mk && decoded.mk!==CFG.mapsKey){
      CFG={...CFG,mapsKey:decoded.mk};changed.push('네이버 지도 Client ID');
    }
    if(decoded.gk && decoded.gk!==CFG.geminiKey){
      CFG={...CFG,geminiKey:decoded.gk};changed.push('Gemini API 키');
    }
    if(decoded.ph && decoded.ph!==CFG.adminPwHash){
      CFG={...CFG,adminPwHash:decoded.ph};changed.push('관리자 비밀번호');
    }
    if(changed.length){
      saveCfg(CFG);
      const cleanURL=window.location.origin+window.location.pathname;
      window.history.replaceState({},'',cleanURL);
      setTimeout(()=>{
        alert('✓ 관리자 설정이 적용되었습니다:\n\n• '+changed.join('\n• ')+'\n\n이제 본인 이름으로 로그인하세요.');
      },300);
    }
  }catch(e){console.warn('설정 적용 오류:',e);}
})();
// v4 → v5 데이터 마이그레이션 (1회 실행)
(function migrate(){
  try{
    const legacyRaw = localStorage.getItem(STORAGE_LEGACY);
    if(!legacyRaw) return;
    const legacy = JSON.parse(legacyRaw);
    if(!legacy?.user?.name) return;

    const ownerName = legacy.user.name;
    // 이미 새 키에 데이터가 있으면 스킵
    if(localStorage.getItem(userKey(ownerName))) return;

    // assignee → ownerName 변환
    const migratedClients = (legacy.clients || []).map(c => {
      const {assignee, ...rest} = c;
      return {
        ...rest,
        ownerName: c.ownerName || assignee || ownerName,
      };
    });

    // 새 사용자 키로 저장
    saveUserData(ownerName, {
      clients: migratedClients,
      visits: legacy.visits || [],
      cycles: legacy.cycles || {...DEF_CYCLES},

    });

    // 세션 정보도 새 키로
    saveSession(legacy.user);

    // 현재 메모리 상태 재구성
    S = {
      user: legacy.user,
      clients: migratedClients,
      visits: legacy.visits || [],
      cycles: legacy.cycles || {...DEF_CYCLES},

    };

    // 레거시 키 삭제
    localStorage.removeItem(STORAGE_LEGACY);
    console.log('[VisitLog] v4 → v5 마이그레이션 완료:', migratedClients.length, '거래처');
  }catch(e){
    console.warn('마이그레이션 오류 (무시됨):', e);
  }
})();

if(CFG.mapsKey)loadMapsScript();
updateOfflineBanner(); // 초기 오프라인 상태 체크
render();
